<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="pill-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="pill-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <filter id="high-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Tilted, bold capsule filling the canvas (no limiting outer box) -->
  <g transform="rotate(45 256 256)" filter="url(#high-glow)">
    <!-- Top Cap (Vibrant Blue) -->
    <path d="M 176 256 V 146 A 80 80 0 0 1 336 146 V 256 Z" fill="url(#pill-blue)" />
    <!-- Bottom Cap (Vibrant Emerald) -->
    <path d="M 336 256 V 366 A 80 80 0 0 1 176 366 V 256 Z" fill="url(#pill-emerald)" />
    <!-- Thick dark separator for separation contrast -->
    <line x1="176" y1="256" x2="336" y2="256" stroke="#0f172a" stroke-width="16" />
  </g>
</svg>
